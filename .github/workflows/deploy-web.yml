name: Deploy web to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'

env:
  CLOUDFLARE_PROJECT_MAIN: ikki-erp
  CLOUDFLARE_PROJECT_DEV: ikki-erp-dev

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Monorepo optimization: Install dependencies from the root to leverage the global lockfile and shared cache
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build specifically for the web package
      - name: Build web app
        run: bun --filter @ikki/web run build

      - name: Determine Cloudflare project
        id: cf
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "project=${CLOUDFLARE_PROJECT_MAIN}" >> $GITHUB_OUTPUT
          else
            echo "project=${CLOUDFLARE_PROJECT_DEV}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
